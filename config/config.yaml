# Valorem - Base Configuration
# Environment-specific overrides are in config/environments/

version: v1

project:
  name: valorem
  version: "0.12.0"
  description: "Production-grade volatility arbitrage trading system"

# ---------------------------------------------------------------------------
# Data & Market
# ---------------------------------------------------------------------------

data:
  providers:
    databento:
      dataset_equities: XNAS.ITCH
      dataset_options: OPRA.PILLAR
      stype_in: raw_symbol
    fred: {}
  ingestion:
    start_date: "2018-05-01"
    end_date: "2021-12-31"
    databento:
      options:
        quote_schema: cbbo-1m
        bar_schema: ohlcv-1d
        statistics_schema: statistics
      cost:
        max_usd: 300.0

calendar:
  market_hours:
    market_open: "09:30:00"
    market_close: "16:00:00"
    timezone: America/New_York

universe:
  underlying: SPY
  options_type: vanilla

# ---------------------------------------------------------------------------
# Surface
# ---------------------------------------------------------------------------

surface:
  delta_buckets:
    P10: [-1.0, -0.15]
    P25: [-0.15, -0.35]
    P40: [-0.35, -0.45]
    ATM: [-0.45, -0.55, 0.45, 0.55]
    C40: [0.35, 0.45]
    C25: [0.15, 0.35]
    C10: [0.0, 0.15]
  tenor_bins:
    bins: [7, 14, 30, 60, 90, 120]
  black_scholes:
    method: newton-raphson
    max_iterations: 100
    tolerance: 1.0e-6
    min_iv: 0.001
    max_iv: 5.0

# ---------------------------------------------------------------------------
# Features & Labels
# ---------------------------------------------------------------------------

features:
  node:
    include_iv: true
    include_volume: true
    include_open_interest: true
    include_greeks: true
    lookback_bars: 60
  global:
    include_skew: true
    include_term_structure: true
    include_spot_features: true
  macro:
    series: [DGS10, DGS2, VIXCLS]
    lookback_days: 252
  masking:
    enabled: true
    mask_crossed: true
    mask_wide_spread: true

labels:
  horizons: [5, 10, 21]

dataset:
  splits:
    train_start: "2018-05-01"
    train_end: "2020-06-30"
    val_start: "2020-07-01"
    val_end: "2021-03-31"
    test_start: "2021-04-01"
    test_end: "2021-12-31"
  min_dte: 7
  max_dte: 120

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------

model:
  patchtst:
    patch_len: 6
    stride: 3
    d_model: 128
    n_heads: 8
    d_ff: 256
    n_layers: 3
    dropout: 0.2
  gnn:
    model_type: GAT
    hidden_dim: 64
    n_layers: 2
    heads: 4
    dropout: 0.2

training:
  device: auto
  batch_size: 64
  max_epochs: 100
  learning_rate: 0.0005
  weight_decay: 0.0001
  early_stopping_patience: 15
  gradient_clip_val: 1.0
  num_workers: 4
  use_amp: true

# ---------------------------------------------------------------------------
# Backtest
# ---------------------------------------------------------------------------

backtest:
  start_date: "2021-04-01"
  end_date: "2021-12-31"
  initial_capital: 100000.0

# ---------------------------------------------------------------------------
# Execution
# ---------------------------------------------------------------------------

execution:
  pricing:
    buy_at: ask
    sell_at: bid
  slippage:
    model: fixed_bps
    fixed_bps: 5.0

# ---------------------------------------------------------------------------
# Risk — calibrated for $100k capital
# ---------------------------------------------------------------------------

risk:
  per_trade:
    max_loss: 5000.0              # 5% — accommodates iron condors & skew trades
    max_contracts: 50
  caps:
    max_abs_delta: 500.0          # ~$500 P&L per $1 underlying move
    max_abs_gamma: 250.0          # Delta shifts $250 per $1 move
    max_abs_vega: 10000.0         # Supports ~10-20 concurrent vol positions
    max_daily_loss: 10000.0       # 10% daily circuit breaker
    max_position_size_usd: 25000.0    # 25% of capital per position
    max_total_notional_usd: 200000.0  # 2x leverage (normal for options)
  stress:
    enabled: true
    underlying_shocks_pct: [-0.10, -0.05, -0.02, 0.02, 0.05, 0.10]
    iv_shocks_points: [-10.0, -5.0, 5.0, 10.0, 20.0]
  kill_switch:
    halt_on_daily_loss: true
    halt_on_stress_breach: true
    halt_on_liquidity_collapse: true
    max_daily_loss: 10000.0       # Matches caps.max_daily_loss
    max_spread_pct: 0.10
  position_management:
    exit_signals:
      min_edge_retention: 0.3
      stop_loss_pct: 0.8
      take_profit_pct: 0.5
      min_dte_exit: 3
    rebalancing:
      enabled: true
      check_interval_seconds: 60
      strategy: close_first
      max_trades_per_rebalance: 3
    drift_bands:
      delta_target: 0.0
      delta_max_drift: 200.0      # Scaled with delta cap
      vega_target: 0.0
      vega_max_drift: 4000.0      # Scaled with vega cap
      gamma_max_drift: 100.0      # Scaled with gamma cap

# ---------------------------------------------------------------------------
# Paper Trading
# ---------------------------------------------------------------------------

paper:
  broker_api_key_env: PAPER_BROKER_API_KEY
  account_id_env: PAPER_ACCOUNT_ID
  enabled: false


# ---------------------------------------------------------------------------
# Infrastructure
# ---------------------------------------------------------------------------

logging:
  level: DEBUG
  format: text
  file_enabled: true
  console_enabled: true

paths:
  data_dir: data
  db_path: data/db.sqlite
  parquet_dir: data/parquet
  manifest_dir: data/manifest
  artifacts_dir: artifacts
  checkpoints_dir: artifacts/checkpoints
  reports_dir: artifacts/reports
  logs_dir: artifacts/logs
