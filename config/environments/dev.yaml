# Development Environment Overrides
# Fast iteration: smaller model, MPS training.
# Only overrides what differs from config.yaml.
# Data ingestion settings and dataset splits live in the base config.

# --- Model (smaller for faster iteration) ---
model:
  patchtst:
    d_model: 64                    # Base: 128
    d_ff: 128                      # Base: 256
    n_layers: 1                    # Base: 3
    n_heads: 4                     # Base: 8
  gnn:
    hidden_dim: 32                 # Base: 64
    n_layers: 1                    # Base: 2
    heads: 2                       # Base: 4

# --- Training ---
training:
  device: mps
  batch_size: 4                    # Base: 32
  max_epochs: 10                   # Base: 100
  early_stopping_patience: 3       # Base: 10
  num_workers: 2                   # Base: 4
  use_amp: false                   # MPS doesn't support AMP

